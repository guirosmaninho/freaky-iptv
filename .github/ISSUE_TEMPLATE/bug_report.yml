name: Bug report
description: Report a reproducible application problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include playlist URLs, credentials, tokens, or personal viewing data.
        Security vulnerabilities must be reported through private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0.1"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - Installer
        - Portable
        - Development build
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, playback mode, and other relevant details.
  - type: checkboxes
    id: sensitive-data
    attributes:
      label: Sensitive data
      options:
        - label: I removed credentials, private URLs, tokens, and personal data.
          required: true
